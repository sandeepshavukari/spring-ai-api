server:
  port: 9090

spring:
  application:
    name: SpringAiApi

  config:
    import: optional:file:.env[.properties]

  datasource:
    url: ${MYSQL_URL:jdbc:mysql://localhost:3306/springai_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:your-google-client-id}
            client-secret: ${GOOGLE_CLIENT_SECRET:your-google-client-secret}
            scope:
              - email
              - profile

  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

  ai:
    openai:
      api-key: ${GROK_API_KEY:your-xai-api-key-here}
      base-url: https://api.x.ai/v1
      chat:
        options:
          model: ${GROK_MODEL:grok-3-mini}
          temperature: 0.7
          max-tokens: 4096

app:
  jwt:
    secret: ${JWT_SECRET:your-256-bit-hex-jwt-secret}
    expiration: ${JWT_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4200}
  rate-limit:
    user-requests-per-day: ${RATE_LIMIT_USER:50}
    premium-requests-per-day: ${RATE_LIMIT_PREMIUM:1000}
  oauth2:
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:4200/oauth2/callback}
  upload:
    dir: ${UPLOAD_DIR:uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: when_authorized

logging:
  level:
    com.sandeep: DEBUG
    org.springframework.security: DEBUG
    org.springframework.ai: INFO
